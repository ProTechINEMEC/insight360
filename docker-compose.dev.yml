services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: insight360_db_dev
    environment:
      POSTGRES_DB: ${DB_NAME:-insight360}
      POSTGRES_USER: ${DB_USER:-insight360_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    volumes:
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
      - ./data/postgres-dev:/var/lib/postgresql/data
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-insight360_user} -d ${DB_NAME:-insight360}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - insight360_dev_net

  minio:
    image: minio/minio:latest
    container_name: insight360_minio_dev
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-insight360_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-devpassword123}
    volumes:
      - ./data/minio-dev:/data
    ports:
      - "19000:9000"
      - "19001:9001"
    networks:
      - insight360_dev_net

networks:
  insight360_dev_net:
    name: insight360_dev_net
    driver: bridge
